<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St. Xavier's — 3D Crest Model</title>
<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #c9a961; font-family: Georgia, serif; overflow: hidden; height: 100vh; }
.header { text-align: center; padding: 20px; }
.header h1 { font-size: 24px; color: #c9a961; }
.header p { color: #666; font-size: 14px; margin-top: 5px; }
.buttons { display: flex; gap: 10px; justify-content: center; padding: 10px; }
.btn { padding: 10px 20px; border: 1px solid #c9a961; background: transparent; color: #c9a961; cursor: pointer; font-family: Georgia, serif; font-size: 14px; border-radius: 8px; transition: all 0.3s; }
.btn:hover { background: #c9a961; color: #0a0a0a; }
.btn.active { background: #c9a961; color: #0a0a0a; }
viewer { width: 100%; height: calc(100vh - 140px); display: block; }
.loading { text-align: center; padding: 50px; color: #666; }
</style>
</head>
<body>
<div class="header">
  <h1>St. Xavier's Junior Senior School — 3D Crest</h1>
  <p>Interactive 3D model — drag to rotate, scroll to zoom</p>
</div>
<div class="buttons">
  <button class="btn active" onclick="loadModel('method3-blender')">Method 3: Blender Procedural</button>
</div>
<div id="viewer-container">
  <model-viewer id="viewer" src="models/method3-blender.glb" alt="St. Xavier's 3D crest model" auto-rotate camera-controls shadow-intensity="1" exposure="0.8" environment-image="neutral" auto-rotate-delay="3000" rotation-per-second="30deg"></model-viewer>
</div>
<script>
function loadModel(name) {
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const viewer = document.getElementById('viewer');
  viewer.src = 'models/' + name + '.glb';
}
</script>
</body>
</html>
